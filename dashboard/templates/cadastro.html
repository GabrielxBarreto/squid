<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUID - Criar Conta</title>
    <style>
        /* Importando uma fonte limpa*/
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #000000;        
            --card-bg: #0D0E11;          
            --surface: #171A21;          
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;        
            --accent: #00E5FF;           
            --accent-gradient: linear-gradient(135deg, #00E5FF, #00B0FF);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .header-section {
            text-align: left;
            margin-bottom: 8px;
        }

        .header-section h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #E2E8F0;
            margin-left: 4px;
        }

        .form-group input {
            background-color: var(--card-bg); 
            border: 1px solid #171A21;
            border-radius: 16px;
            padding: 16px;
            color: #FFFFFF;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .form-group input:focus {
            border-color: var(--accent); 
            background-color: var(--surface);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.1);
        }

        .action-button {
            background: var(--accent-gradient);
            color: #000000; 
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            box-shadow: 0 8px 24px rgba(0, 229, 255, 0.2);
            transition: all 0.2s ease;
        }

        .action-button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 229, 255, 0.35);
        }

        .toggle-auth {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .toggle-auth a {
            color: var(--accent); 
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .toggle-auth a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="header-section">
            <h1>Criar Conta</h1>
            <p>Gerencie e divida suas assinaturas facilmente.</p>
        </div>

        <form method="POST" action="">{% csrf_token %}
            <div class="form-group">
                <label for="nome">Nome</label>
                <input name="nome" type="text" id="nome" placeholder="Como devemos te chamar?">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input name="email" type="email" id="email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input name="senha" type="password" id="senha" placeholder="••••••••">
            </div>

            <button type="submit" class="action-button">Cadastrar</button>
        </form>

        <div class="toggle-auth">
            Já tem uma conta? <a href="{% url 'login' %}">Entrar agora</a>
        </div>
    </div>

</body>
</html>
